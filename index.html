/* ========== DATA STORE ========== */
const DB = {
  keys: {
    navOrder: 'cds_nav_order',
    collapsedSections: 'cds_collapsed_sections',
    inquiry: 'cds_inquiry',
    quotation: 'cds_quotation',
    customerDev: 'cds_customer_dev',
    contracts: 'cds_contracts',
    sampling: 'cds_sampling',
    shipment: 'cds_shipment',
    payment: 'cds_payment',
    shippingPlan: 'cds_shipping_plan',
    logistics: 'cds_logistics',
    customs: 'cds_customs',
  },
  get(k, def) { 
    try { 
      const v = localStorage.getItem(this.keys[k]); 
      if(!v) return def;
      const parsed = JSON.parse(v);
      // Fix: ensure arrays are arrays
      if(Array.isArray(def) && !Array.isArray(parsed)) return def;
      return parsed;
    } catch { return def } 
  },
  set(k, v) { localStorage.setItem(this.keys[k], JSON.stringify(v)) },
  exportAll() {
    const data = {};
    Object.keys(this.keys).forEach(k => data[k] = this.get(k));
    return JSON.stringify(data, null, 2);
  },
  importAll(json) {
    const data = JSON.parse(json);
    Object.keys(data).forEach(k => { if(this.keys[k]) this.set(k, data[k]) });
  }
};

/* ========== UTILS ========== */
function $(sel){return document.querySelector(sel)}
function $$(sel){return document.querySelectorAll(sel)}
function showToast(msg, type='info'){
  const t = document.createElement('div');
  t.className='toast';
  t.textContent=msg;
  if(type==='error') t.style.background='#dc2626';
  if(type==='success') t.style.background='#059669';
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 3000);
}
function uid(){return Date.now()+Math.random().toString(36).slice(2)}
function fmtDate(d){if(!d)return'';const x=new Date(d);return isNaN(x)?d:x.toISOString().slice(0,10)}
function downloadJSON(obj, filename){
  const blob = new Blob([JSON.stringify(obj,null,2)],{type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=filename; a.click();
  URL.revokeObjectURL(url);
}
function readFile(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=rej;r.readAsArrayBuffer(file)})}
function safeArr(v, def){return Array.isArray(v)?v:def}

/* ========== EXCEL IMPORT/EXPORT ========== */
async function importExcel(file, schema){
  const buf = await readFile(file);
  const wb = XLSX.read(buf, {type:'array'});
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
  if(rows.length<2) return [];
  const headers = rows[0].map(h=>String(h).trim().replace(/[\s\u00A0\u200B-\u200D\uFEFF]+/g,'').toLowerCase());
  console.log('Normalized headers:', headers);
  const result = [];
  for(let i=1;i<rows.length;i++){
    const row = rows[i];
    const obj = {id:uid()};
    let matched = 0;
    schema.forEach(s=>{
      const idx = headers.findIndex(h=>s.aliases.some(a=>{
        const cleanA = a.toLowerCase().replace(/[\s\u00A0\u200B-\u200D\uFEFF]+/g,'');
        return h.includes(cleanA) || cleanA.includes(h);
      }));
      if(idx>=0 && idx<row.length){
        obj[s.key] = row[idx];
        matched++;
      }
    });
    // Fallback: if remark not matched, try loose match on remaining columns
    if(!obj.remark && !obj.Remark){
      headers.forEach((h,hi)=>{
        if(hi<row.length && !Object.values(obj).includes(row[hi])){
          if(h.includes('remark')||h.includes('note')||h.includes('memo')||h.includes('comment')||h.includes('说明')||h.includes('备注')){
            obj.remark = row[hi];
          }
        }
      });
    }
    result.push(obj);
  }
  console.log('Imported', result.length, 'rows');
  return result;
}
function exportExcel(data, headers, filename){
  const wsData = [headers.map(h=>h.label)];
  data.forEach(row=>{wsData.push(headers.map(h=>row[h.key]||''))});
  const ws = XLSX.utils.aoa_to_sheet(wsData);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Sheet1');
  XLSX.writeFile(wb, filename);
}

/* ========== GENERIC TABLE RENDERER ========== */
function renderTable(containerId, data, schema, options={}){
  const container = document.getElementById(containerId);
  if(!container) return;
  const {editable=true, onChange, onDelete, filters, search, compact=false} = options;
  let displayData = [...data];
  if(search){
    const s = search.toLowerCase();
    displayData = displayData.filter(row=>schema.some(col=>String(row[col.key]||'').toLowerCase().includes(s)));
  }
  if(filters){
    Object.keys(filters).forEach(key=>{
      if(filters[key]) displayData = displayData.filter(row=>String(row[key]||'')===filters[key]);
    });
  }

  let html = '<table><thead><tr>';
  schema.forEach(col=>{
    html += `<th data-key="${col.key}">${col.label}<span class="filter-icon">▼</span><div class="filter-dropdown" id="filter-${containerId}-${col.key}"></div></th>`;
  });
  if(onDelete) html += '<th style="width:60px">Action</th>';
  html += '</tr></thead><tbody>';
  displayData.forEach((row, idx)=>{
    html += '<tr data-idx="'+idx+'">';
    schema.forEach(col=>{
      const val = row[col.key]||'';
      html += `<td data-key="${col.key}" ${editable?'contenteditable="true"':''} title="${val}">${val}</td>`;
    });
    if(onDelete) html += `<td><button class="btn btn-danger btn-sm" onclick="${onDelete}('${row.id}')">Del</button></td>`;
    html += '</tr>';
  });
  html += '</tbody></table>';
  if(displayData.length===0) html += '<div style="padding:20px;text-align:center;color:#9ca3af">No data found</div>';
  container.innerHTML = html;

  // Cell edit handlers
  if(editable){
    container.querySelectorAll('td[contenteditable="true"]').forEach(td=>{
      td.addEventListener('blur', function(){
        const rowIdx = parseInt(this.closest('tr').dataset.idx);
        const key = this.dataset.key;
        const newVal = this.textContent.trim();
        if(data[rowIdx] && data[rowIdx][key] !== newVal){
          data[rowIdx][key] = newVal;
          this.title = newVal;
          if(onChange) onChange(data);
        }
      });
      td.addEventListener('keydown', function(e){if(e.key==='Enter'){e.preventDefault();this.blur()}});
    });
  }

  // Filter dropdowns
  schema.forEach(col=>{
    const th = container.querySelector(`th[data-key="${col.key}"]`);
    const dd = container.querySelector(`#filter-${containerId}-${col.key}`);
    if(th && dd){
      const values = [...new Set(data.map(r=>r[col.key]).filter(Boolean))];
      dd.innerHTML = '<div class="filter-option" data-val="">(All)</div>' + values.map(v=>`<div class="filter-option" data-val="${v}">${v}</div>`).join('');
      th.addEventListener('click', (e)=>{
        e.stopPropagation();
        document.querySelectorAll('.filter-dropdown').forEach(d=>{if(d!==dd)d.classList.remove('show')});
        dd.classList.toggle('show');
      });
      dd.querySelectorAll('.filter-option').forEach(opt=>{
        opt.addEventListener('click', (e)=>{
          e.stopPropagation();
          dd.classList.remove('show');
          if(options.onFilter) options.onFilter(col.key, opt.dataset.val);
        });
      });
    }
  });
}

/* ========== GENERIC PAGE BUILDER ========== */
function buildPageToolbar(pageKey, label, schema, options={}){
  const {searchKey, filtersKey, addFn, importFn, exportFn, backupFn, restoreFn} = options;
  const searchVal = window[searchKey] || '';
  const hasTab = options.tabKey;
  let tabHtml = '';
  if(hasTab){
    const tab = window[options.tabKey] || 'df';
    tabHtml = `<button class="btn ${tab==='df'?'btn-primary':'btn-secondary'}" onclick="window.${options.tabKey}='df';render${pageKey}()">DF</button>
    <button class="btn ${tab==='3x3'?'btn-primary':'btn-secondary'}" onclick="window.${options.tabKey}='3x3';render${pageKey}()">3X3</button>`;
  }
  return `<div class="toolbar">
    ${tabHtml}
    <input class="search-input" placeholder="Search..." value="${searchVal}" oninput="window.${searchKey}=this.value;render${pageKey}()">
    <button class="btn btn-success btn-sm" onclick="${addFn}()">+ Add Row</button>
    <button class="btn btn-secondary btn-sm" onclick="document.getElementById('${pageKey}-import').click()">📥 Import Excel</button>
    <input type="file" id="${pageKey}-import" style="display:none" accept=".xlsx,.xls" onchange="${importFn}(this)">
    <button class="btn btn-secondary btn-sm" onclick="${exportFn}()">📤 Export Excel</button>
    <button class="btn btn-secondary btn-sm" onclick="${backupFn}()">💾 Backup JSON</button>
    <button class="btn btn-secondary btn-sm" onclick="document.getElementById('${pageKey}-restore').click()">📂 Restore JSON</button>
    <input type="file" id="${pageKey}-restore" style="display:none" accept=".json" onchange="${restoreFn}(this)">
  </div>`;
}

  const current = location.hash.slice(1)||'dashboard';
  let html = `<div style="padding:14px 18px;font-size:16px;font-weight:700;border-bottom:1px solid #334155;display:flex;align-items:center;gap:8px">
    <span style="font-size:22px">📊</span><span class="text">CharlesDataSync</span>
  </div>`;
  items.forEach((item, idx)=>{
    html += `<div class="nav-item ${item.id===current?'active':''}" data-id="${item.id}" draggable="true" data-idx="${idx}">
      <span class="icon">${item.icon}</span><span class="text">${item.label}</span>
    </div>`;
  });
  html += `<div style="margin-top:auto;padding:14px;border-top:1px solid #334155">
    <button class="btn btn-secondary btn-sm" style="width:100%;justify-content:center" onclick="resetNav()">↺ 恢复默认排序</button>
  </div>`;
  document.getElementById('sidebar').innerHTML = html;

  // Drag sort
  let dragSrc = null;
  document.querySelectorAll('.nav-item').forEach(item=>{
    item.addEventListener('dragstart', function(e){dragSrc=this;this.classList.add('dragging');e.dataTransfer.effectAllowed='move'});
    item.addEventListener('dragend', function(){this.classList.remove('dragging');document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('drag-over'))});
    item.addEventListener('dragover', function(e){e.preventDefault();this.classList.add('drag-over')});
    item.addEventListener('dragleave', function(){this.classList.remove('drag-over')});
    item.addEventListener('drop', function(e){
      e.stopPropagation();
      e.preventDefault();
      this.classList.remove('drag-over');
      if(dragSrc && dragSrc!==this){
        // Move dragSrc before the drop target in DOM
        this.parentNode.insertBefore(dragSrc, this);
        const newOrder = [...document.querySelectorAll('.nav-item')].map(el=>el.dataset.id);
        DB.set('navOrder', newOrder);
        renderNav();
        showToast('导航排序已更新');
      }
    });
    item.addEventListener('click', ()=>{location.hash=item.dataset.id});
  });
}

function renderYarnTracking(){
  const data = DB.get('yarnTracking',[]);
  const filters = window.yarnTrackingFilters || {};
  const search = window.yarnTrackingSearch || '';
  document.getElementById('yarnTracking').innerHTML = `
    <h1 class="page-title">纱坯追踪</h1>
    <div class="subtitle">Yarn In-house → Knitting L/T (days) → Yarn/Knitting L/T (weeks) 自动换算</div>
    <div class="toolbar">
      <input class="search-input" placeholder="Search..." value="${search}" oninput="window.yarnTrackingSearch=this.value;renderYarnTracking()">
      <button class="btn btn-success btn-sm" onclick="addYarnTrackingRow()">+ Add Row</button>
      <button class="btn btn-secondary btn-sm" onclick="document.getElementById('yarnTracking-import').click()">📥 Import Excel</button>
      <input type="file" id="yarnTracking-import" style="display:none" accept=".xlsx,.xls" onchange="importYarnTrackingExcel(this)">
      <button class="btn btn-secondary btn-sm" onclick="exportYarnTrackingExcel()">📤 Export Excel</button>
      <button class="btn btn-secondary btn-sm" onclick="backupYarnTracking()">💾 Backup JSON</button>
      <button class="btn btn-secondary btn-sm" onclick="document.getElementById('yarnTracking-restore').click()">📂 Restore JSON</button>
      <input type="file" id="yarnTracking-restore" style="display:none" accept=".json" onchange="restoreYarnTracking(this)">
    </div>
    <div class="table-container" id="yarnTracking-table"></div>
  `;
  renderTable('yarnTracking-table', data, yarnTrackingSchema, {
    editable:true, onChange:d=>{
      // Auto-calculate weeks when days change
      d.forEach(row=>{
        const yarn = parseFloat(row.yarnInHouse)||0;
        const knit = parseFloat(row.knittingLT)||0;
        if(yarn||knit) row.yarnKnittingWeeks = ((yarn+knit)/7).toFixed(2);
      });
      DB.set('yarnTracking',d);
    }, onDelete:'deleteYarnTracking',
    filters, search, onFilter:(k,v)=>{window.yarnTrackingFilters={...filters,[k]:v};renderYarnTracking();}
  });
}

/* ========== ROUTER ========== */
function route(){
  const page = location.hash.slice(1)||'dashboard';
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  const target = document.getElementById(page);
  if(target) target.classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active', n.dataset.id===page));
  if(page==='dashboard') renderDashboard();
  if(page==='inquiry') renderInquiry();
  if(page==='quotation') renderQuotation();
  if(page==='customerDev') renderCustomerDev();
  if(page==='contracts') renderContracts();
  if(page==='sampling') renderSampling();
  if(page==='shipment') renderShipment();
  if(page==='payment') renderPayment();
  if(page==='shippingPlan') renderShippingPlan();
  if(page==='logistics') renderLogistics();
  if(page==='customs') renderCustoms();
  if(page==='yarnTracking') renderYarnTracking();
}

function initApp(){
  document.getElementById('app').innerHTML = `

      <div class="page" id="logistics"></div>
      <div class="page" id="customs"></div>
      <div class="page" id="yarnTracking"></div>
    </div>
  `;

}
initApp();
